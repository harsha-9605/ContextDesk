name: Keep Supabase Alive
on:
  schedule:
    # This runs at 00:00 UTC every Monday and Thursday (twice a week)
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Storage
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/storage/v1/bucket" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}"
